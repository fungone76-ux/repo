milestones:
  - id: "maria_noticed"
    name: "La Donna Invisibile"
    condition:
      affinity: 25
      flag: "maria_defended"
    icon: "👁️"
  
  - id: "maria_friend"
    name: "La Confidente"
    condition:
      affinity: 50
      flag: "maria_home_visited"
    icon: "🏠"
  
  - id: "maria_lover"
    name: "La Devota"
    condition:
      affinity: 100
      flag: "maria_accepted_young_lover"
    icon: "🔥"
