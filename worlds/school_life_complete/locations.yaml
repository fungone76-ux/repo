    aliases: ["segreteria", "segreteria scolastica", "ufficio amministrativo", "amministrazione"]
    
    available_times: ["Morning", "Afternoon"]
    closed_description: "La segreteria è chiusa. Torna negli orari di ufficio."
    
    available_characters: ["segretaria", "impiegato"]
    companion_can_follow: true
  
  school_storage:
